name: Build macOS App

on:
  push:
    branches: [ main ] # Tự động build khi có code mới đẩy lên nhánh main

jobs:
  build:
    runs-on: macos-latest # Yêu cầu GitHub cấp một máy ảo macOS

    steps:
    - name: Checkout code
      uses: actions/checkout@v4 # Đã nâng cấp lên v4

    - name: Set up Python
      uses: actions/setup-python@v5 # Đã nâng cấp lên v5
      with:
        python-version: '3.12'

    - name: Cài đặt thư viện
      run: |
        python -m pip install --upgrade pip
        pip install pandas openpyxl qrcode flask pyopenssl pillow pyinstaller

    - name: Đóng gói bằng PyInstaller
      run: |
        pyinstaller --noconsole --onefile --windowed Tool_Linh.py

    - name: Nén file .app thành .zip (để không bị lỗi quyền khi tải)
      run: |
        cd dist
        zip -r Tool_Linh_Mac.zip Tool_Linh.app

    - name: Upload thành phẩm (Artifact)
      uses: actions/upload-artifact@v4 # Đã nâng cấp lên v4 để sửa lỗi
      with:
        name: Mac-App
        path: dist/Tool_Linh_Mac.zip
